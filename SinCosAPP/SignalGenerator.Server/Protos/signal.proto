syntax = "proto3";
option csharp_namespace = "SignalGenerator.Server";

service SignalGenerator {
  // Клиент открывает один поток и шлет в него настройки (SignalRequest), 
  // а сервер в этот же поток шлет точки (SignalPoint)
  rpc StreamSignal (stream SignalRequest) returns (stream SignalPoint);
}

message SignalRequest {
  double min_x = 1;
  double max_x = 2;
  double min_y = 3;
  double max_y = 4;
  int32 count = 5;
}

message SignalPoint {
  double x = 1;
  double y = 2;
}